kind: food
name: Grilled Rosemary Chicken
recipe_type: secondi
image: secondi/assets/images/secondi.png

ingredients:
  - name: Chicken Thighs
    amount: 1.2
    unit: kg
  - name: Extra Virgin Olive Oil
    amount: 45
    unit: ml
  - name: Lemon Zest
    amount: 1
    unit: lemon
  - name: Fresh Rosemary
    amount: 2
    unit: sprigs
  - name: Garlic
    amount: 3
    unit: cloves
  - name: Salt
    amount: to taste
  - name: Black Pepper
    amount: to taste

steps:
  - Marinate chicken with oil, lemon zest, rosemary, garlic, salt, and pepper.
  - Rest at least 30 minutes, then preheat grill to medium-high.
  - Grill skin-side down first, then turn until cooked through and charred in spots.
  - Rest briefly before serving.

notes: Works well with roasted potatoes or a bitter green salad.

history: |
  Herb-marinated grilled chicken appears across many Italian home kitchens.
  The secondi course emphasizes protein-focused dishes served after primi.
