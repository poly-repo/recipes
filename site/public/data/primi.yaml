kind: food
name: Spaghetti Aglio e Olio
recipe_type: primi
image: primi/assets/images/primi.png

ingredients:
  - name: Spaghetti
    amount: 320
    unit: g
  - name: Garlic
    amount: 5
    unit: cloves
  - name: Extra Virgin Olive Oil
    amount: 80
    unit: ml
  - name: Chili Flakes
    amount: 1
    unit: tsp
  - name: Parsley
    amount: 20
    unit: g
  - name: Salt
    amount: to taste

steps:
  - Cook spaghetti in salted water until al dente.
  - Gently warm oil with sliced garlic and chili until fragrant, not browned.
  - Toss drained pasta with the flavored oil and a splash of pasta water.
  - Finish with chopped parsley and adjust seasoning.

notes: Keep the garlic pale to avoid bitterness.

history: |
  Aglio e olio is a classic Neapolitan first course known for speed, simplicity, and balance.
  It highlights pantry ingredients and careful heat control.
