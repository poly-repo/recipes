kind: food
name: Rigatoni all'Amatriciana
recipe_type: primi
image: assets/images/primi.png

ingredients:
  - name: Rigatoni
    amount: 320
    unit: g
  - name: Guanciale
    amount: 140
    unit: g
  - name: Peeled Tomatoes
    amount: 400
    unit: g
  - name: Pecorino Romano
    amount: 70
    unit: g
  - name: Chili Flakes
    amount: 0.5
    unit: tsp
  - name: Black Pepper
    amount: to taste

steps:
  - Render diced guanciale in a pan over medium heat until crisp and aromatic.
  - Add crushed tomatoes and chili, then simmer gently for 12 to 15 minutes.
  - Cook rigatoni in salted water until al dente, reserving some pasta water.
  - Toss pasta with sauce and guanciale, adjusting texture with pasta water.
  - Finish with plenty of pecorino and black pepper.

notes: Traditional versions avoid onion and garlic; guanciale and pecorino carry the dish.

history: |
  Amatriciana originates from the town of Amatrice and became a Roman staple.
  The classic profile comes from guanciale, tomato, pecorino, and chili.
