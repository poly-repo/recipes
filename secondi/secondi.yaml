kind: food
name: Chicken Cacciatore
recipe_type: secondi
image: assets/images/secondi.png

ingredients:
  - name: Bone-In Chicken Pieces
    amount: 1.4
    unit: kg
  - name: Extra Virgin Olive Oil
    amount: 45
    unit: ml
  - name: Onion
    amount: 1
    unit: large
  - name: Carrot
    amount: 1
    unit: medium
  - name: Celery Stalk
    amount: 1
    unit: large
  - name: Garlic
    amount: 3
    unit: cloves
  - name: Dry White Wine
    amount: 150
    unit: ml
  - name: Crushed Tomatoes
    amount: 400
    unit: g
  - name: Fresh Thyme
    amount: 3
    unit: sprigs
  - name: Salt
    amount: to taste
  - name: Black Pepper
    amount: to taste

steps:
  - Season chicken and brown in olive oil until well colored, then set aside.
  - Sweat onion, carrot, celery, and garlic in the same pan.
  - Deglaze with white wine and reduce by half.
  - Add tomatoes and thyme, return chicken to the pan, cover, and simmer 35 to 45 minutes.
  - Uncover for a final reduction and adjust seasoning before serving.

notes: Excellent with polenta or crusty bread to soak up the sauce.

history: |
  Cacciatore means "hunter-style" and appears in many regional Italian variations.
  The core idea is rustic braised poultry with aromatics, wine, and tomatoes.
