kind: food
name: Focaccia Barese
recipe_type: bakery
image: assets/images/bakery.png

ingredients:
  - name: Bread Flour
    amount: 500
    unit: g
  - name: Water
    amount: 360
    unit: g
  - name: Extra Virgin Olive Oil
    amount: 40
    unit: g
  - name: Fine Sea Salt
    amount: 10
    unit: g
  - name: Instant Yeast
    amount: 4
    unit: g
  - name: Cherry Tomatoes
    amount: 150
    unit: g

steps:
  - Mix flour, water, oil, salt, and yeast until a sticky dough forms.
  - Rest 20 minutes, then fold the dough a few times until smoother.
  - Transfer to an oiled tray, dimple the surface, and top with tomatoes.
  - Proof until airy, then bake at 230C until deeply golden.

notes: Crisp exterior, airy crumb, and lots of olive oil aroma.

history: |
  Focaccia is one of Italy's oldest flatbreads, with roots in Liguria and many regional forms.
  The Bari style often includes tomatoes and generous olive oil.
