kind: food
name: Ciabatta Rolls
recipe_type: bakery
image: assets/images/bakery.png

ingredients:
  - name: Strong Bread Flour
    amount: 500
    unit: g
  - name: Water
    amount: 390
    unit: g
  - name: Extra Virgin Olive Oil
    amount: 20
    unit: g
  - name: Fine Sea Salt
    amount: 11
    unit: g
  - name: Instant Yeast
    amount: 3
    unit: g
  - name: Semolina Flour
    amount: as needed
    unit: for dusting

steps:
  - Mix flour, water, yeast, oil, and salt until a very soft dough forms.
  - Let rest 20 minutes, then perform 3 stretch-and-fold rounds every 20 minutes.
  - Ferment until doubled, divide into 8 pieces, and shape gently on semolina.
  - Final proof 30 to 45 minutes, then bake at 230C with steam until deep golden.

notes: Hydration is high by design; handle with wet hands and minimal pressure.

history: |
  Ciabatta was developed in Italy in the 1980s as a rustic, highly hydrated loaf.
  Its open crumb and crackly crust made it popular for panini and table bread.
